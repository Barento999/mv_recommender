version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: movie-reco-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - movie-reco-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie-reco-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:password@mongodb:27017/movie_recommendation?authSource=admin
      DATABASE_NAME: movie_recommendation
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "False"
    depends_on:
      - mongodb
    networks:
      - movie-reco-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movie-reco-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - movie-reco-network

volumes:
  mongodb_data:

networks:
  movie-reco-network:
    driver: bridge
